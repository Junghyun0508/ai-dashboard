<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 역량강화 교육 이용 현황</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1c23; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* 상단 KPI 바 */
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #2d2f39; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; }
        .kpi-item { text-align: center; }
        .kpi-label { font-size: 12px; color: #9da1ab; margin-bottom: 5px; }
        .kpi-value { font-size: 20px; font-weight: bold; color: #00f2ff; }

        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #3e414d; border: none; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #5d6171; border-bottom: 3px solid #00f2ff; }

        /* 차트 영역 */
        .chart-container { background: #2d2f39; padding: 20px; border-radius: 10px; margin-bottom: 20px; height: 320px; } /* 높이 축소 */
        h2 { font-size: 16px; margin-top: 0; color: #00f2ff; border-left: 4px solid #00f2ff; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <div style="font-size: 22px; font-weight: bold;">AI 역량강화 교육 이용 현황 🤖</div>
        <div class="kpi-item"><div class="kpi-label">대상총원</div><div class="kpi-value">2,787명</div></div>
        <div class="kpi-item"><div class="kpi-label">수강인원</div><div class="kpi-value">1,017명</div></div>
        <div class="kpi-item"><div class="kpi-label">사용률</div><div class="kpi-value">36.5%</div></div>
        <div style="font-size: 12px; color: #9da1ab;">Update: 2026-03-20</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPlatform('all')">전체 보기</button>
        <button class="tab-btn" onclick="showPlatform('fastcampus')">Fast Campus</button>
        <button class="tab-btn" onclick="showPlatform('inflearn')">Inflearn</button>
    </div>

    <div id="fastcampus-section">
        <h2>① Fast Campus 주차별 이용 현황 (학습시간)</h2>
        <div class="chart-container">
            <canvas id="fcChart"></canvas>
        </div>
    </div>

    <div id="inflearn-section">
        <h2>② Inflearn 주차별 이용 현황 (학습시간)</h2>
        <div class="chart-container">
            <canvas id="inflearnChart"></canvas>
        </div>
    </div>
</div>

<script>
    // 주차별 데이터 (엑셀 데이터 기반 집계)
    const labels = ['9월 4주', '10월 1주', '10월 2주', '10월 3주', '10월 4주', '11월 1주', '11월 2주', '11월 3주', '12월 1주', '1월 1주'];
    
    // Fast Campus 데이터 (빨간색 계열)
    const fcData = [372, 143, 102, 149, 243, 250, 279, 396, 534, 247];
    // Inflearn 데이터 (녹색 계열)
    const inData = [53, 35, 28, 45, 62, 70, 85, 92, 110, 58];

    function createChart(id, label, data, color) {
        return new Chart(document.getElementById(id), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: data,
                    borderColor: color,
                    backgroundColor: color + '33',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#444' }, ticks: { color: '#9da1ab' } },
                    x: { grid: { display: false }, ticks: { color: '#9da1ab' } }
                }
            }
        });
    }

    createChart('fcChart', '학습시간(H)', fcData, '#ff5e5e');
    createChart('inflearnChart', '학습시간(H)', inData, '#00ffab');

    // 탭 전환 로직
    function showPlatform(platform) {
        const fc = document.getElementById('fastcampus-section');
        const inf = document.getElementById('inflearn-section');
        const btns = document.querySelectorAll('.tab-btn');
        
        btns.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if(platform === 'fastcampus') { fc.style.display = 'block'; inf.style.display = 'none'; }
        else if(platform === 'inflearn') { fc.style.display = 'none'; inf.style.display = 'block'; }
        else { fc.style.display = 'block'; inf.style.display = 'block'; }
    }
</script>

</body>
</html>
