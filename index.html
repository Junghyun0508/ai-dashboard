<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 역량강화교육 이용현황 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 14px; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #2c3e50; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-section { margin-top: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AI 역량강화교육 이용현황</h1>
        <p>기준일: 2026년 3월 23일 준비 자료</p>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>총 학습시간(H)</h3>
            <p id="totalTime">2,483.88</p>
        </div>
        <div class="card">
            <h3>총 수강인원(명)</h3>
            <p id="totalStudents">2,642</p>
        </div>
        <div class="card">
            <h3>평균 학습시간</h3>
            <p id="avgTime">0.94 H</p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <canvas id="monthlyChart"></canvas>
        </div>
        <div class="chart-card">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <div class="table-section">
        <h3>월별 상세 이용 현황</h3>
        <table>
            <thead>
                <tr>
                    <th>접속년월</th>
                    <th>학습시간(H)</th>
                    <th>수강인원(명)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2025년 9월</td>
                    <td>360.82</td>
                    <td>319</td>
                </tr>
                <tr>
                    <td>2025년 10월</td>
                    <td>547.67</td>
                    <td>678</td>
                </tr>
                <tr>
                    <td>2025년 11월</td>
                    <td>850.20</td>
                    <td>920</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 월별 추이 차트 (예시 데이터 기반)
    const ctxMonthly = document.getElementById('monthlyChart').getContext('2d');
    new Chart(ctxMonthly, {
        type: 'line',
        data: {
            labels: ['9월', '10월', '11월', '12월', '1월'],
            datasets: [{
                label: '월별 학습시간 추이',
                data: [360, 547, 850, 420, 306],
                borderColor: '#3498db',
                fill: false,
                tension: 0.1
            }]
        },
        options: { responsive: true, plugins: { title: { display: true, text: '월별 학습시간 변화' } } }
    });

    // 카테고리별 비중 차트
    const ctxCategory = document.getElementById('categoryChart').getContext('2d');
    new Chart(ctxCategory, {
        type: 'doughnut',
        data: {
            labels: ['AI 기초', '데이터 분석', '딥러닝', 'LLM 활용'],
            datasets: [{
                data: [40, 25, 20, 15],
                backgroundColor: ['#1abc9c', '#3498db', '#9b59b6', '#f1c40f']
            }]
        },
        options: { responsive: true, plugins: { title: { display: true, text: '교육 과정별 수강 비중' } } }
    });
</script>

</body>
</html>
